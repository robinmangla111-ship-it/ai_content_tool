app:
  title: "🎬 YouTube Slide Video Creator"
  version: "1.0.0"
  max_slides: 10
  default_slides: 5
  video_resolution: [1920, 1080]
  slide_duration: 5  # seconds per slide (default)

languages:
  English:
    code: "en"
    gtts_code: "en"
    label: "English"
  Hindi:
    code: "hi"
    gtts_code: "hi"
    label: "हिंदी"
  Hinglish:
    code: "hi"
    gtts_code: "hi"
    label: "Hinglish (हिं + Eng)"

groq:
  default_model: "llama-3.1-70b-versatile"
  models:
    - "llama-3.1-8b-instant"
    - "llama-3.1-70b-versatile"
    - "llama-3.2-3b-preview"
    - "llama-3.2-11b-vision-preview"
    - "mixtral-8x7b-32768"

huggingface:
  image_models:
    - id: "stabilityai/stable-diffusion-xl-base-1.0"
      label: "SDXL Base (May require Pro)"
    - id: "runwayml/stable-diffusion-v1-5"
      label: "SD 1.5 (Usually Works)"
    - id: "prompthero/openjourney"
      label: "OpenJourney (Best Free Alternative)"
    - id: "CompVis/stable-diffusion-v1-4"
      label: "Stable Diffusion v1-4 (Old but works)"

  default_model: "prompthero/openjourney"   


themes:
  Cinematic Dark:
    bg_color: [15, 15, 25]
    text_color: [255, 255, 255]
    accent_color: [255, 165, 0]
    heading_color: [255, 200, 50]
    overlay_opacity: 0.7
    gradient_start: [15, 15, 25]
    gradient_end: [40, 20, 60]
    pptx_bg: "0F0F19"
    pptx_text: "FFFFFF"
    pptx_accent: "FFA500"

  Vibrant Gradient:
    bg_color: [20, 30, 80]
    text_color: [255, 255, 255]
    accent_color: [0, 230, 180]
    heading_color: [100, 220, 255]
    overlay_opacity: 0.6
    gradient_start: [20, 30, 80]
    gradient_end: [80, 20, 120]
    pptx_bg: "141E50"
    pptx_text: "FFFFFF"
    pptx_accent: "00E6B4"

  Clean White:
