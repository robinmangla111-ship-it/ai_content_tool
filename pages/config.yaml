    pptx_bg: "FAFAFF"
    pptx_text: "1E1E32"
    pptx_accent: "4664FF"

  Saffron Energy:
    bg_color: [255, 100, 0]
    text_color: [255, 255, 255]
    accent_color: [255, 220, 0]
